mainSections   = ["posts"]
rssFullContent = true
favicon        = "/favicon.png"

[footer]
    since      = 2026
    customText = "牧屋 MUWU | 在草原上放牧创意 🐑🏠"

[dateFormat]
    published   = "2006-01-02"
    lastUpdated = "2006-01-02 15:04"

[sidebar]
    emoji    = "🏠"
    subtitle = "独立游戏开发者 | Unity & C# | AI赋能创作"
    avatar   = ""
    compact  = false

[article]
    math        = false
    toc         = true
    readingTime = true
    
    [article.license]
        enabled = false

[widgets]
    homepage = [
        { type = "search" },
        { type = "archives", params = { limit = 5 } },
        { type = "categories", params = { limit = 10 } },
        { type = "tag-cloud", params = { limit = 10 } },
    ]
    page = [{ type = "toc" }]

[comments]
    enabled  = false

[cookies]
    enabled = false

[opengraph]
    enabled = true

[colorScheme]
    toggle  = true
    default = "auto"

[imageProcessing.cover]
    enabled = true

[imageProcessing.content]
    enabled = true