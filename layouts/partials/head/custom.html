<style>
:root { --accent-color: #7CB342 !important; --accent-color-darker: #5a8c2f !important; }
[data-scheme="dark"] { --accent-color: #F4A623 !important; --accent-color-darker: #d48a0f !important; }

body {
    background: linear-gradient(rgba(248,250,245,0.75), rgba(248,250,245,0.85)), 
                url('https://images.unsplash.com/photo-1500964757637-c85e8a162699?w=1920&q=80') center/cover fixed !important;
}

[data-scheme="dark"] body { background: #0a0a15 !important; }

.stars-container {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0; display: none;
}
[data-scheme="dark"] .stars-container { display: block; }

.star { position: absolute; background: white; border-radius: 50%; animation: twinkle 3s infinite; }
@keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

.sidebar, .article-list--tile article, .widget {
    background: rgba(255,255,255,0.88) !important;
    backdrop-filter: blur(20px);
    border: 1px solid rgba(124,179,66,0.25) !important;
}

[data-scheme="dark"] .sidebar,
[data-scheme="dark"] .article-list--tile article,
[data-scheme="dark"] .widget {
    background: rgba(20,20,35,0.88) !important;
    border: 1px solid rgba(244,166,35,0.25) !important;
}

.article-list--tile article:hover {
    transform: translateY(-10px) !important;
    box-shadow: 0 20px 60px rgba(124,179,66,0.3) !important;
}

[data-scheme="dark"] .article-list--tile article:hover {
    box-shadow: 0 20px 60px rgba(244,166,35,0.35) !important;
}

.sidebar .site-avatar:hover { transform: scale(1.2) rotate(12deg) !important; }
.menu .menu-item:hover { transform: translateX(8px) !important; }
.menu .menu-item:hover a { color: var(--accent-color) !important; }

.tagCloud-tags a:hover {
    background: var(--accent-color) !important;
    color: white !important;
    transform: scale(1.12) !important;
}

a { color: var(--accent-color) !important; }
.main-container { background: transparent !important; }
.main-container, .sidebar { position: relative; z-index: 1; }
</style>

<script>
(function() {
    function createStars() {
        let c = document.querySelector('.stars-container');
        if(c) c.remove();
        c = document.createElement('div');
        c.className = 'stars-container';
        document.body.insertBefore(c, document.body.firstChild);
        
        for(let i=0; i<150; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            const size = Math.random();
            if(size < 0.6) s.style.width = s.style.height = '1px';
            else if(size < 0.9) s.style.width = s.style.height = '2px';
            else { s.style.width = s.style.height = '3px'; s.style.boxShadow = '0 0 4px white'; }
            s.style.left = Math.random()*100+'%';
            s.style.top = Math.random()*100+'%';
            s.style.animationDelay = Math.random()*3+'s';
            s.style.animationDuration = (2+Math.random()*2)+'s';
            c.appendChild(s);
        }
    }
    
    if(document.readyState==='loading') {
        document.addEventListener('DOMContentLoaded', createStars);
    } else { 
        createStars(); 
    }
})();
</script>
